name: Keep Streamlit App Awake

on:
  schedule:
    # Every 6 hours - comfortably under Streamlit Community Cloud's
    # 12-hour sleep threshold, with margin for scheduling delays
    # (GitHub can delay scheduled runs slightly during high load).
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # Allows manually triggering this workflow from the GitHub Actions tab,
    # useful for testing that it works without waiting for the schedule.

jobs:
  keep-awake:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Selenium
        run: pip install selenium

      - name: Visit app to keep it awake
        run: python keep_awake.py
